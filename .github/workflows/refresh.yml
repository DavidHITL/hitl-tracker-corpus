name: Refresh corpus

on:
  schedule:
    # Daily at 06:00 UTC — after the tracker's 03:00 + 03:15 + 03:30 UTC cron cluster.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Export corpus from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name  "hitl-corpus-bot"
          git config user.email "hitl-corpus-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            # Include the manifest timestamp in the commit subject so the log
            # is a machine-readable audit trail of refreshes.
            ts="$(jq -r '.generated_at' data/manifest.json)"
            git commit -m "data: refresh corpus ($ts)"
            git push
          else
            echo "No changes — skipping commit."
          fi
